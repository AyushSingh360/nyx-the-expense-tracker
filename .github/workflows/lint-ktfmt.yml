name: Lint & Ktfmt

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Create .env for Secrets plugin
        run: echo "GEMINI_API_KEY=ci_placeholder" > .env

      - name: Run Android lint
        run: gradle lintDebug

      - name: Check Kotlin formatting with ktfmt
        run: |
          KTFMT_VERSION=v0.52
          curl -sSLO "https://github.com/facebook/ktfmt/releases/download/$KTFMT_VERSION/ktfmt-$KTFMT_VERSION-jar-with-dependencies.jar"
          find app/src -name "*.kt" -exec java -jar ktfmt-$KTFMT_VERSION-jar-with-dependencies.jar --dry-run --set-exit-if-changed {} +
